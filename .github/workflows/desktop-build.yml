name: desktop-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: doubao-voice-input-windows-x64
          - os: macos-13
            artifact_name: doubao-voice-input-macos-intel
          - os: macos-14
            artifact_name: doubao-voice-input-macos-apple-silicon

    runs-on: ${{ matrix.os }}
    env:
      CMAKE_ARGS: -DCMAKE_POLICY_VERSION_MINIMUM=3.5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop bundle
        run: npm run tauri build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error
